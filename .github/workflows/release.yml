name: Build & Release

on:
  push:
    tags:
      - 'v*'
  # Also allow manual trigger from the Actions tab — useful for rebuilding
  # a tag without pushing a new one.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS — Node 20 will be removed from the runner 2026-09-16.
          # Sticking with LTS rather than 24 to stay matched to what most
          # contributors run locally.
          node-version: '22'
          cache: npm

      - name: Install dependencies
        # Using `npm install` instead of `npm ci` here. `npm ci` enforces
        # a strict lockfile match which fails on WASM-only optional deps
        # (@emnapi/runtime + @emnapi/core, deps-of-deps from
        # @napi-rs/wasm-runtime) that npm intentionally skips on Node
        # platforms where they're never used. `npm install` is permissive
        # about that mismatch while still respecting locked versions
        # for everything that IS installed.
        # `--legacy-peer-deps` swallows peer-conflicts from optional
        # packages (motion/hls.js/etc).
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build renderer + main
        run: npx electron-vite build

      - name: Rebuild native modules for Electron
        # better-sqlite3 + sharp ship as .node ABI builds for the system
        # Node. They need to be re-compiled for the bundled Electron
        # before electron-builder can package them. Without this step
        # electron-builder fails with `NODE_MODULE_VERSION mismatch`.
        run: npx electron-builder install-app-deps

      - name: Download yt-dlp binary
        # yt-dlp.exe is excluded from the repo via .gitignore's `*.exe`
        # rule. electron-builder's `extraResources` config expects it
        # at resources/bin/yt-dlp.exe — pull the latest release stable
        # build before packaging so the resulting installer ships with
        # a working tube-resolver / downloader.
        shell: pwsh
        run: |
          $url = 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe'
          New-Item -ItemType Directory -Force -Path resources\bin | Out-Null
          Invoke-WebRequest -Uri $url -OutFile resources\bin\yt-dlp.exe
          "yt-dlp size: $((Get-Item resources\bin\yt-dlp.exe).Length / 1MB) MB"

      - name: Package Windows installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # All code-signing env vars cleared. electron-builder respects
          # CSC_* AND WIN_CSC_* — Windows runners auto-populate
          # WIN_CSC_LINK with a path that doesn't actually exist, which
          # makes the build fail trying to load a cert from a non-file.
          # We don't sign at all; explicit empty wins.
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''
          WIN_CSC_LINK: ''
          WIN_CSC_KEY_PASSWORD: ''

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
